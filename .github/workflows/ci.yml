name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      BRAPI_API_KEY: ${{ secrets.BRAPI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # next-env.d.ts é gitignored e gerado pelo `next build`/`dev`. Sem ele, o
      # `tsc --noEmit` isolado perde os tipos de import de SVG (SVGR) e quebra com
      # falsos "className não atribuível a IntrinsicAttributes". Geramos o stub
      # canônico (o build depois sobrescreve com o mesmo conteúdo).
      - name: Generate next-env.d.ts
        run: printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
      - name: Type Check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      # Vitest fora do gate: a suíte completa (~100 arquivos jsdom) pendura no CI
      # (>30min) e é cronicamente lenta. Gate de render fica por conta do job `e2e`
      # (smoke de rotas em browser real). Rodar vitest localmente quando relevante.
      - name: Build
        run: npm run build

  # Smoke de render: sobe Postgres efêmero, builda, sobe o app e abre cada rota
  # autenticada num browser real. Pega crashes de runtime (ex.: hook de contexto
  # fora do Provider) que type-check/lint/build NÃO pegam.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sfc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sfc_test?schema=public
      JWT_SECRET: ci-e2e-jwt-secret-not-for-prod
      BRAPI_API_KEY: ${{ secrets.BRAPI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Prisma generate + migrate + seed
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run seed
      - name: Build
        run: npm run build
      - name: Start app
        run: |
          npm start &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/health >/dev/null && echo "app up" && exit 0
            sleep 2
          done
          echo "app não subiu a tempo" && exit 1
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E (inclui smoke de rotas)
        run: npx playwright test
